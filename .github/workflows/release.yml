name: release

# Automated releases via semantic-release on every push to main:
# analyzes conventional commits → version + CHANGELOG + git tag + npm publish
# (OIDC trusted publishing + provenance, NO NPM_TOKEN) + GitHub Release.
#
# One-time npm setup (done once, after the manual 0.1.0 bootstrap publish):
#   npmjs.com → package → Settings → Trusted Publisher → GitHub Actions:
#   repo "diegomarino/opencode-lmstudio-warm", workflow "release.yml".
on:
  push:
    branches: [main]

# Two quick pushes to main must not run semantic-release concurrently (they
# would race the version bump + tag). Queue the second run; never cancel a
# release that may be mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the release commit/tag + create the GitHub Release
  issues: write # semantic-release/github may comment
  pull-requests: write
  id-token: write # OIDC trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    steps:
      # Third-party actions pinned by commit SHA (tags are mutable) — this
      # workflow holds id-token: write and publishes to npm.
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies (locked)
        run: bun install --frozen-lockfile
      - name: Verify (typecheck + unit tests + shellcheck)
        run: bun run check

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24 # bundles npm 11.x
          registry-url: "https://registry.npmjs.org"
      - name: Pin npm to a version that supports trusted publishing (>= 11.5.1)
        # Pinned exactly — "npm@latest" would run whatever shipped that day in
        # the publish path.
        run: npm install -g npm@11.18.0

      - name: Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bunx semantic-release
